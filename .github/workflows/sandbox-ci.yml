name: Sandbox Testing Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production
      debug_mode:
        description: 'Enable Debug Logging'
        required: false
        default: 'false'
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Quality Verification
        run: |
          echo "Verifying environment: ${{ github.event.inputs.environment }}"
          echo "Debug mode: ${{ github.event.inputs.debug_mode }}"
          echo "Simulating code check..."
          sleep 5
          echo "Verification complete!"

  build-and-test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Build Artifacts
        run: |
          echo "Compiling sources..."
          sleep 8
          echo "Compilation successful!"

      - name: Run Test Suite
        run: |
          echo "Running unit and integration tests..."
          sleep 12
          echo "All tests passed!"
